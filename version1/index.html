<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>伴研小Q LabMate Demo</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="showcase">
      <section class="phone-side">
        <div class="phone-frame">
          <div class="phone-screen">
            <div class="status-bar">
              <div class="status-left">
                <span class="status-time">16:57</span>
                <span class="status-dot"></span>
              </div>
              <div class="status-right">
                <span>5G</span>
                <span>▮▮▮▮</span>
                <span>71</span>
              </div>
            </div>

            <header class="qq-header">
              <div class="header-left">
                <button class="icon-button back-button" aria-label="返回">‹</button>
                <div class="count-pill">99+</div>
              </div>

              <div class="header-center">
                <div class="chat-name-row">
                  <h1 id="chat-name">伴研小Q</h1>
                  <span class="chat-badge">Q</span>
                </div>
                <div class="chat-status-row">
                  <span class="online-dot"></span>
                  <span id="chat-status">在线 · WiFi</span>
                </div>
              </div>

              <button class="icon-button menu-button" aria-label="菜单">☰</button>
            </header>

            <main id="chat-thread" class="chat-thread" aria-live="polite"></main>

            <footer class="input-dock">
              <div class="input-row">
                <div class="draft-box">
                  <p class="draft-hint" id="composer-label">当前演示输入</p>
                  <textarea
                    id="composer-input"
                    class="draft-input"
                    spellcheck="false"
                    placeholder="在这里输入你想让伴研小Q处理的内容"
                  ></textarea>
                </div>
                <button class="send-button" id="replay-button">发送</button>
              </div>

              <div class="tool-row">
                <button class="tool-button" aria-label="语音">
                  <svg class="tool-svg" viewBox="0 0 24 24" aria-hidden="true">
                    <rect x="8" y="3.5" width="8" height="12" rx="4"></rect>
                    <path d="M5.5 11.5c0 3.7 2.9 6.5 6.5 6.5s6.5-2.8 6.5-6.5"></path>
                    <path d="M12 18v3.5"></path>
                    <path d="M8.5 21h7"></path>
                  </svg>
                </button>
                <button class="tool-button" aria-label="图片">
                  <svg class="tool-svg" viewBox="0 0 24 24" aria-hidden="true">
                    <rect x="3.5" y="5" width="17" height="14" rx="3"></rect>
                    <circle cx="9" cy="10" r="1.4"></circle>
                    <path d="M5.8 16.7l4.1-4.2 2.8 2.8 2-2 3.5 3.4"></path>
                  </svg>
                </button>
                <button class="tool-button" aria-label="拍摄">
                  <svg class="tool-svg" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M7 7.5l1.5-2h7L17 7.5h2.5A1.5 1.5 0 0 1 21 9v8.5a1.5 1.5 0 0 1-1.5 1.5h-15A1.5 1.5 0 0 1 3 17.5V9A1.5 1.5 0 0 1 4.5 7.5z"></path>
                    <circle cx="12" cy="13" r="3.6"></circle>
                  </svg>
                </button>
                <button class="tool-button" aria-label="文件">
                  <svg class="tool-svg" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M4 8.5A2.5 2.5 0 0 1 6.5 6h3l1.6 1.9H17.5A2.5 2.5 0 0 1 20 10.4v6.1A2.5 2.5 0 0 1 17.5 19h-11A2.5 2.5 0 0 1 4 16.5z"></path>
                  </svg>
                </button>
                <button class="tool-button" aria-label="表情">
                  <svg class="tool-svg" viewBox="0 0 24 24" aria-hidden="true">
                    <circle cx="12" cy="12" r="8.5"></circle>
                    <circle cx="9" cy="10" r="1"></circle>
                    <circle cx="15" cy="10" r="1"></circle>
                    <path d="M8.5 14c.9 1.2 2.1 1.8 3.5 1.8s2.6-.6 3.5-1.8"></path>
                  </svg>
                </button>
                <button class="tool-button plus-button" aria-label="更多">
                  <svg class="tool-svg" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M12 5v14"></path>
                    <path d="M5 12h14"></path>
                  </svg>
                </button>
              </div>
            </footer>
          </div>
        </div>

        <div class="controller-panel">
          <div class="controller-header">
            <div>
              <p class="panel-eyebrow">比赛演示链路</p>
              <h2 id="scenario-title">高危消息安全伞</h2>
            </div>
            <button id="autoplay-button" class="ghost-button">自动路演</button>
          </div>

          <div class="scenario-grid">
            <button class="scenario-card active" data-scenario="repair-message">
              <span class="scenario-index">01</span>
              <strong>沟通彩排</strong>
              <p>把一段慌乱的大白话，变成能发给导师的成熟汇报。</p>
            </button>
            <button class="scenario-card" data-scenario="advisor-translate">
              <span class="scenario-index">02</span>
              <strong>导师意图翻译</strong>
              <p>把“你看着办”拆成显性要求、潜在期待和下一步动作。</p>
            </button>
            <button class="scenario-card" data-scenario="lab-rag">
              <span class="scenario-index">03</span>
              <strong>课题组知识问答</strong>
              <p>把群里的隐性知识，变成随时可问的 AI 大师兄。</p>
            </button>
            <button class="scenario-card" data-scenario="emotional-support">
              <span class="scenario-index">04</span>
              <strong>情绪树洞与转介</strong>
              <p>不是泛泛安慰，而是基于授权上下文理解情绪来源。</p>
            </button>
          </div>
        </div>
      </section>

      <aside class="inspector">
        <header class="inspector-header">
          <p class="panel-eyebrow">AI 判断面板</p>
          <h2>为什么这不是普通陪聊 AI</h2>
        </header>

        <section class="inspector-card">
          <p class="card-title">场景识别</p>
          <div class="pill-row" id="intent-pills"></div>
        </section>

        <section class="inspector-card">
          <p class="card-title">上下文增强</p>
          <div class="toggle-row">
            <label class="toggle">
              <input type="checkbox" id="toggle-history" checked />
              <span>历史对话</span>
            </label>
            <label class="toggle">
              <input type="checkbox" id="toggle-advisor" checked />
              <span>导师摘要</span>
            </label>
            <label class="toggle">
              <input type="checkbox" id="toggle-group" checked />
              <span>群聊摘要</span>
            </label>
          </div>
          <p class="panel-note">只在用户授权后使用，用来更准确理解压力来自哪里。</p>
        </section>

        <section class="inspector-card">
          <p class="card-title">参考上下文</p>
          <ul class="stack-list" id="context-list"></ul>
        </section>

        <section class="inspector-card">
          <p class="card-title">压力与关系信号</p>
          <div class="signal-grid" id="signal-grid"></div>
        </section>

        <section class="inspector-card">
          <p class="card-title">系统输出</p>
          <ul class="stack-list" id="output-list"></ul>
        </section>

        <section class="inspector-card">
          <p class="card-title">风险等级</p>
          <div class="risk-bar">
            <div id="risk-fill" class="risk-fill risk-green"></div>
          </div>
          <p id="risk-label" class="risk-label">绿色：常规支持</p>
        </section>
      </aside>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
