<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>伴研小Q LabMate Demo</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="showcase">
      <section class="phone-side">
        <div class="phone-frame">
          <div class="phone-screen">
            <div class="status-bar">
              <div class="status-left">
                <span class="status-time">16:57</span>
                <span class="status-dot"></span>
              </div>
              <div class="status-right">
                <span>5G</span>
                <span>▮▮▮▮</span>
                <span>71</span>
              </div>
            </div>

            <header class="qq-header">
              <div class="header-left">
                <button class="icon-button back-button" aria-label="返回">‹</button>
                <div class="count-pill">99+</div>
              </div>

              <div class="header-center">
                <div class="chat-name-row">
                  <h1 id="chat-name">伴研小Q</h1>
                  <span class="chat-badge">Q</span>
                </div>
                <div class="chat-status-row">
                  <span class="online-dot"></span>
                  <span id="chat-status">在线 · WiFi</span>
                </div>
              </div>

              <button class="icon-button menu-button" aria-label="菜单">☰</button>
            </header>

            <main id="chat-thread" class="chat-thread" aria-live="polite"></main>

            <footer class="input-dock">
              <section class="consent-card">
                <p class="consent-copy">
                  你可以选择是否授权小Q参考你与导师的历史沟通摘要、已加入的课题组群资料。与小Q的对话会自动保存在记忆中。授权后，小Q能更准确理解你的压力来源。
                </p>
                <div class="consent-actions">
                  <button id="enable-context-button" class="consent-primary">开启上下文增强</button>
                  <button id="skip-context-button" class="consent-secondary">暂不授权</button>
                </div>
                <div id="group-picker" class="group-picker" hidden>
                  <p class="group-picker-title">选择想开放给小Q参考的群聊</p>
                  <div class="group-chip-grid">
                    <button class="group-chip" data-group-id="g1">Wang lab(无导师版）</button>
                    <button class="group-chip" data-group-id="g2">王老师课题组群</button>
                    <button class="group-chip" data-group-id="g3">王老师</button>
                    <button class="group-chip group-chip-custom" data-group-id="custom" aria-label="自由选择群聊">
                      <svg class="group-plus-svg" viewBox="0 0 24 24" aria-hidden="true">
                        <circle cx="12" cy="12" r="11"></circle>
                        <path d="M12 6.5v11"></path>
                        <path d="M6.5 12h11"></path>
                      </svg>
                    </button>
                  </div>
                </div>
              </section>

              <div class="input-row">
                <div class="draft-box">
                  <textarea
                    id="composer-input"
                    class="draft-input"
                    spellcheck="false"
                    placeholder="帮我改一段给导师的话&#10;导师这句话什么意思？&#10;问问实验室资料&#10;我现在有点撑不住了"
                  ></textarea>
                </div>
                <div id="plain-composer" class="plain-composer" hidden>
                  <textarea
                    id="plain-composer-input"
                    class="plain-composer-input"
                    spellcheck="false"
                    placeholder="输入消息"
                  ></textarea>
                </div>
                <button class="send-button" id="replay-button">发送</button>
              </div>

              <div class="tool-row">
                <button class="tool-button" aria-label="语音">
                  <svg class="tool-svg" viewBox="0 0 24 24" aria-hidden="true">
                    <rect x="8" y="3.5" width="8" height="12" rx="4"></rect>
                    <path d="M5.5 11.5c0 3.7 2.9 6.5 6.5 6.5s6.5-2.8 6.5-6.5"></path>
                    <path d="M12 18v3.5"></path>
                    <path d="M8.5 21h7"></path>
                  </svg>
                </button>
                <button class="tool-button" aria-label="图片">
                  <svg class="tool-svg" viewBox="0 0 24 24" aria-hidden="true">
                    <rect x="3.5" y="5" width="17" height="14" rx="3"></rect>
                    <circle cx="9" cy="10" r="1.4"></circle>
                    <path d="M5.8 16.7l4.1-4.2 2.8 2.8 2-2 3.5 3.4"></path>
                  </svg>
                </button>
                <button class="tool-button" aria-label="拍摄">
                  <svg class="tool-svg" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M7 7.5l1.5-2h7L17 7.5h2.5A1.5 1.5 0 0 1 21 9v8.5a1.5 1.5 0 0 1-1.5 1.5h-15A1.5 1.5 0 0 1 3 17.5V9A1.5 1.5 0 0 1 4.5 7.5z"></path>
                    <circle cx="12" cy="13" r="3.6"></circle>
                  </svg>
                </button>
                <button class="tool-button" aria-label="文件">
                  <svg class="tool-svg" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M4 8.5A2.5 2.5 0 0 1 6.5 6h3l1.6 1.9H17.5A2.5 2.5 0 0 1 20 10.4v6.1A2.5 2.5 0 0 1 17.5 19h-11A2.5 2.5 0 0 1 4 16.5z"></path>
                  </svg>
                </button>
                <button class="tool-button" aria-label="表情">
                  <svg class="tool-svg" viewBox="0 0 24 24" aria-hidden="true">
                    <circle cx="12" cy="12" r="8.5"></circle>
                    <circle cx="9" cy="10" r="1"></circle>
                    <circle cx="15" cy="10" r="1"></circle>
                    <path d="M8.5 14c.9 1.2 2.1 1.8 3.5 1.8s2.6-.6 3.5-1.8"></path>
                  </svg>
                </button>
                <button class="tool-button plus-button" aria-label="更多">
                  <svg class="tool-svg" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M12 5v14"></path>
                    <path d="M5 12h14"></path>
                  </svg>
                </button>
              </div>
            </footer>

            <section id="contact-overlay" class="selector-overlay" hidden>
              <div class="selector-page">
                <header class="selector-header">
                  <button id="contact-overlay-back" class="selector-back" aria-label="返回">‹</button>
                  <h2 class="selector-title">选择联系人</h2>
                  <div class="selector-header-spacer"></div>
                </header>

                <div class="selector-search-bar">
                  <span class="selector-search-icon">⌕</span>
                  <span>搜索</span>
                </div>

                <button id="open-group-selector" class="selector-entry">
                  <span>从群聊中选择</span>
                  <span class="selector-arrow">›</span>
                </button>

                <section class="selector-section">
                  <div class="selector-section-title">相关好友</div>
                  <div class="selector-contact-row">
                    <span class="selector-radio"></span>
                    <span class="selector-avatar selector-avatar-muted">S</span>
                    <span class="selector-contact-name">S</span>
                  </div>
                  <div class="selector-contact-row">
                    <span class="selector-radio"></span>
                    <span class="selector-avatar selector-avatar-hat"></span>
                    <span class="selector-contact-name">农学1903张新凯</span>
                  </div>
                  <div class="selector-contact-row">
                    <span class="selector-radio"></span>
                    <span class="selector-avatar selector-avatar-blue"></span>
                    <span class="selector-contact-name">黄新</span>
                  </div>
                  <div class="selector-contact-row">
                    <span class="selector-radio"></span>
                    <span class="selector-avatar selector-avatar-fox"></span>
                    <span class="selector-contact-name">植生1908葛行宇</span>
                  </div>
                  <div class="selector-contact-row">
                    <span class="selector-radio"></span>
                    <span class="selector-avatar selector-avatar-muted"></span>
                    <span class="selector-contact-name">植生1905朱涵晓</span>
                  </div>
                </section>

                <section class="selector-section selector-section-recent">
                  <div class="selector-section-title">最近联系人</div>
                  <div class="selector-contact-row">
                    <span class="selector-radio selector-radio-active"></span>
                    <span class="selector-avatar selector-avatar-bot">伴</span>
                    <span class="selector-contact-name">伴研小Q</span>
                  </div>
                  <div class="selector-contact-row">
                    <span class="selector-radio"></span>
                    <span class="selector-avatar selector-avatar-water"></span>
                    <span class="selector-contact-name">李纵擎</span>
                  </div>
                </section>

                <button class="selector-submit" disabled>立即创建</button>
              </div>
            </section>

            <section id="group-overlay" class="selector-overlay" hidden>
              <div class="selector-page">
                <header class="selector-header">
                  <button id="group-overlay-back" class="selector-back" aria-label="返回">‹</button>
                  <h2 class="selector-title">选择群聊</h2>
                  <div class="selector-header-spacer"></div>
                </header>

                <div class="selector-search-bar">
                  <span class="selector-search-icon">⌕</span>
                  <span>搜索</span>
                </div>

                <section class="selector-section selector-group-list">
                  <button class="selector-group-row" data-group-name="实验仪器答疑群">
                    <span class="selector-group-avatar avatar-lab">仪</span>
                    <span class="selector-group-name">实验仪器答疑群</span>
                    <span class="selector-arrow">›</span>
                  </button>
                  <button class="selector-group-row" data-group-name="综合实验楼A栋大群">
                    <span class="selector-group-avatar avatar-build">综</span>
                    <span class="selector-group-name">综合实验楼A栋大群</span>
                    <span class="selector-arrow">›</span>
                  </button>
                  <button class="selector-group-row" data-group-name="2305生科班级群">
                    <span class="selector-group-avatar avatar-class">班</span>
                    <span class="selector-group-name">2305生科班级群</span>
                    <span class="selector-arrow">›</span>
                  </button>
                  <button class="selector-group-row" data-group-name="话剧社团">
                    <span class="selector-group-avatar avatar-drama">话</span>
                    <span class="selector-group-name">话剧社团</span>
                    <span class="selector-arrow">›</span>
                  </button>
                  <button class="selector-group-row" data-group-name="生科第五党支部">
                    <span class="selector-group-avatar avatar-party">党</span>
                    <span class="selector-group-name">生科第五党支部</span>
                    <span class="selector-arrow">›</span>
                  </button>
                </section>

                <button class="selector-submit" disabled>立即创建</button>
              </div>
            </section>

            <section id="home-overlay" class="selector-overlay home-overlay" hidden>
              <div class="home-page">
                <div class="home-status-bar">
                  <div class="status-left">
                    <span class="status-time">10:57</span>
                    <span class="status-dot"></span>
                  </div>
                  <div class="status-right">
                    <span>5G</span>
                    <span>▮▮▮▮</span>
                    <span>100</span>
                  </div>
                </div>

                <header class="home-header">
                  <div class="home-profile">
                    <div class="home-avatar">碎</div>
                    <div class="home-profile-copy">
                      <h2>碎花同学</h2>
                      <div class="home-presence">
                        <span class="online-dot"></span>
                        <span>在线 - 5G</span>
                        <span class="home-presence-arrow">›</span>
                      </div>
                    </div>
                  </div>
                  <button class="home-add-button" aria-label="新增">＋</button>
                </header>

                <div class="home-search">搜索</div>

                <main class="home-conversation-list">
                  <button class="home-conversation-row" data-chat-id="companion" data-chat-name="伴研小Q" data-chat-status="在线 · WiFi">
                    <div class="home-conversation-avatar convo-bot">伴</div>
                    <div class="home-conversation-main">
                      <div class="home-conversation-top">
                        <strong>伴研小Q</strong>
                        <span>昨天 16:57</span>
                      </div>
                      <p>你好</p>
                    </div>
                  </button>

                  <button class="home-conversation-row" data-chat-id="advisor" data-chat-name="王老师" data-chat-status="在线 · WiFi">
                    <div class="home-conversation-avatar convo-teacher">王</div>
                    <div class="home-conversation-main">
                      <div class="home-conversation-top">
                        <strong>王老师</strong>
                        <span>10:21</span>
                      </div>
                      <p>下午把修改后的提纲发我。</p>
                    </div>
                  </button>

                  <button class="home-conversation-row" data-chat-id="advisor-group" data-chat-name="王老师课题组群" data-chat-status="群聊">
                    <div class="home-conversation-avatar convo-group-a">组</div>
                    <div class="home-conversation-main">
                      <div class="home-conversation-top">
                        <strong>王老师课题组群</strong>
                        <span>昨天 21:16</span>
                      </div>
                      <p>李师姐：BCA 试剂盒在二楼 -20 度冰箱第三层右侧。</p>
                    </div>
                  </button>

                  <button class="home-conversation-row" data-chat-id="lab-group" data-chat-name="Wang lab(无导师版）" data-chat-status="群聊">
                    <div class="home-conversation-avatar convo-group-b">W</div>
                    <div class="home-conversation-main">
                      <div class="home-conversation-top">
                        <strong>Wang lab(无导师版）</strong>
                        <span>昨天 19:42</span>
                      </div>
                      <p>张师兄：明天组会每个人汇报 5 分钟。</p>
                    </div>
                  </button>

                  <button class="home-conversation-row" data-chat-id="instrument-group" data-chat-name="实验仪器答疑群" data-chat-status="群聊">
                    <div class="home-conversation-avatar convo-group-c">仪</div>
                    <div class="home-conversation-main">
                      <div class="home-conversation-top">
                        <strong>实验仪器答疑群</strong>
                        <span>周一</span>
                      </div>
                      <p>王师兄：离心机 Error 404 先检查转子是否锁紧。</p>
                    </div>
                  </button>
                </main>

                <nav class="home-bottom-nav">
                  <button class="home-nav-item active">
                    <span class="home-nav-icon">💬</span>
                    <span>消息</span>
                  </button>
                  <button class="home-nav-item">
                    <span class="home-nav-icon">👤</span>
                    <span>联系人</span>
                  </button>
                  <button class="home-nav-item">
                    <span class="home-nav-icon">◔</span>
                    <span>动态</span>
                  </button>
                </nav>
              </div>
            </section>
          </div>
        </div>

      </section>
      <input type="checkbox" id="toggle-history" checked hidden />
      <input type="checkbox" id="toggle-advisor" checked hidden />
      <input type="checkbox" id="toggle-group" checked hidden />
    </div>

    <script src="./chat-data.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
